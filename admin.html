<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>天祥後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #131316;
  --card: #1c1c21;
  --border: #2a2a32;
  --gold: #c9a84c;
  --gold-dim: #8a6e2e;
  --white: #f0eff0;
  --silver: #8a909a;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --safe: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--white); font-family:'Noto Sans TC',sans-serif; overflow-x:hidden; }

/* ── SCREENS ── */
.screen { display:none; min-height:100dvh; flex-direction:column; }
.screen.active { display:flex; }

/* ── TOP BAR ── */
.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(10,10,11,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  padding:0 16px; height:56px;
}
.topbar-back {
  background:none; border:none; color:var(--silver);
  font-size:1.4rem; cursor:pointer; padding:4px; line-height:1;
}
.topbar-title { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:0.08em; flex:1; }
.topbar-action { background:var(--gold); color:#000; border:none; padding:7px 16px; font-size:0.8rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.08em; cursor:pointer; border-radius:4px; }
.topbar-action:disabled { background:var(--gold-dim); cursor:not-allowed; }

/* ── SCREEN 1: 選員工 ── */
#screen-home { padding-bottom:calc(32px + var(--safe)); }
.home-header { padding:32px 20px 24px; }
.home-logo { font-family:'Barlow Condensed',sans-serif; font-size:1.6rem; font-weight:900; color:var(--gold); letter-spacing:0.1em; }
.home-logo span { color:var(--white); }
.home-sub { font-size:0.82rem; color:var(--silver); margin-top:4px; }
.home-section-label { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--silver); padding:0 20px 10px; }

.staff-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
.staff-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:16px 18px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:all .15s; -webkit-user-select:none; user-select:none;
}
.staff-card:active { transform:scale(0.98); border-color:var(--gold); }
.staff-avatar {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:900; color:#000;
  flex-shrink:0;
}
.staff-info { flex:1; }
.staff-name { font-size:1rem; font-weight:700; }
.staff-meta { font-size:0.75rem; color:var(--silver); margin-top:2px; }
.staff-arrow { color:var(--silver); font-size:1.2rem; }

.config-section { margin:28px 16px 0; }
.config-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.config-row { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; }
.config-row:last-child { border-bottom:none; }
.config-row:active { background:rgba(255,255,255,0.03); }
.config-icon { font-size:1.2rem; width:28px; text-align:center; }
.config-label { flex:1; font-size:0.9rem; }
.config-arrow { color:var(--silver); font-size:0.9rem; }

/* ── SCREEN 2: 車輛列表 ── */
#screen-cars { }
.cars-list { padding:12px 16px; display:flex; flex-direction:column; gap:10px; flex:1; }
.car-item {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  display:flex; gap:12px; overflow:hidden; cursor:pointer;
  transition:border-color .15s;
}
.car-item:active { border-color:var(--gold); }
.car-thumb {
  width:90px; height:75px; object-fit:cover; flex-shrink:0; background:#1a1a1f;
  display:flex; align-items:center; justify-content:center; color:var(--border); font-size:1.5rem;
}
.car-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.car-item-info { flex:1; padding:10px 12px 10px 0; min-width:0; }
.car-item-brand { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--silver); }
.car-item-name { font-size:0.95rem; font-weight:700; margin:2px 0 6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.car-item-price { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; color:var(--gold); }
.car-item-tag { display:inline-block; background:var(--gold); color:#000; font-size:0.6rem; font-weight:700; padding:1px 7px; border-radius:2px; margin-left:6px; vertical-align:middle; }

.fab {
  position:fixed; bottom:calc(24px + var(--safe)); right:20px; z-index:40;
  width:56px; height:56px; border-radius:50%;
  background:var(--gold); color:#000; border:none;
  font-size:1.6rem; cursor:pointer; box-shadow:0 4px 20px rgba(201,168,76,0.4);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.fab:active { transform:scale(0.93); }

.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
.empty-icon { font-size:3rem; margin-bottom:12px; opacity:0.4; }
.empty-text { color:var(--silver); font-size:0.9rem; line-height:1.6; }

/* ── SCREEN 3: 新增/編輯車輛 ── */
#screen-edit { }
.edit-body { flex:1; overflow-y:auto; padding:16px 16px calc(100px + var(--safe)); }

/* 照片上傳區 */
.photo-section { margin-bottom:20px; }
.photo-label { font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--silver); margin-bottom:10px; }
.photo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.photo-slot {
  aspect-ratio:1; border-radius:8px; overflow:hidden; position:relative;
  background:var(--card); border:1.5px dashed var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-user-select:none; user-select:none;
}
.photo-slot:active { border-color:var(--gold); }
.photo-slot img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-slot .add-icon { font-size:1.4rem; color:var(--silver); }
.photo-slot .del-btn {
  position:absolute; top:4px; right:4px;
  background:rgba(0,0,0,0.7); color:#fff; border:none;
  width:22px; height:22px; border-radius:50%; font-size:0.7rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.photo-slot.main-slot { grid-column:span 2; grid-row:span 2; aspect-ratio:auto; height:160px; }
.photo-uploading { position:absolute; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; }
.photo-spinner { width:24px; height:24px; border:2px solid rgba(255,255,255,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* 表單 */
.form-group { margin-bottom:14px; }
.form-label { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--silver); margin-bottom:6px; display:block; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--card); border:1px solid var(--border);
  color:var(--white); padding:12px 14px; font-size:0.9rem;
  font-family:'Noto Sans TC',sans-serif; border-radius:8px; outline:none;
  -webkit-appearance:none; appearance:none;
  transition:border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--gold); }
.form-textarea { min-height:80px; resize:none; line-height:1.6; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* 刪除按鈕 */
.delete-btn {
  width:100%; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
  color:var(--red); padding:14px; font-size:0.9rem; font-weight:700;
  font-family:'Noto Sans TC',sans-serif; border-radius:8px; cursor:pointer;
  margin-top:8px; transition:background .15s;
}
.delete-btn:active { background:rgba(239,68,68,0.2); }

/* 儲存 bottom bar */
.save-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:rgba(10,10,11,0.97); backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:12px 16px calc(12px + var(--safe));
}
.save-btn {
  width:100%; background:var(--gold); color:#000; border:none;
  padding:15px; font-size:1rem; font-weight:700;
  font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em;
  border-radius:8px; cursor:pointer; transition:opacity .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.save-btn:disabled { opacity:0.5; cursor:not-allowed; }
.save-btn:active:not(:disabled) { opacity:0.85; }

/* ── SCREEN 4: 設定 ── */
#screen-settings .edit-body { }
.settings-group { margin-bottom:20px; }
.settings-group-label { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--silver); padding:0 4px 8px; }
.settings-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.settings-row { padding:14px 16px; border-bottom:1px solid var(--border); }
.settings-row:last-child { border-bottom:none; }
.settings-row-label { font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--silver); margin-bottom:6px; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(90px + var(--safe)); left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:10px 20px; font-size:0.85rem; white-space:nowrap;
  opacity:0; transition:all .3s; z-index:999; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:flex-end; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-sheet { background:var(--surface); border-radius:16px 16px 0 0; width:100%; padding:20px 20px calc(20px + var(--safe)); animation:slideUp .25s ease; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-title { font-size:1rem; font-weight:700; margin-bottom:16px; }
.modal-btn { width:100%; background:var(--card); border:1px solid var(--border); color:var(--white); padding:14px; font-size:0.9rem; border-radius:8px; cursor:pointer; margin-bottom:10px; font-family:'Noto Sans TC',sans-serif; }
.modal-btn.danger { color:var(--red); border-color:rgba(239,68,68,0.3); }
.modal-cancel { width:100%; background:none; border:none; color:var(--silver); padding:10px; font-size:0.9rem; cursor:pointer; margin-top:4px; font-family:'Noto Sans TC',sans-serif; }
</style>
</head>
<body>

<!-- ══ SCREEN 1: 選員工 ══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-logo">天祥<span>後台管理</span></div>
    <div class="home-sub">選擇員工身份進入管理</div>
  </div>
  <div class="home-section-label">員工列表</div>
  <div class="staff-list" id="staff-list">
    <div style="text-align:center;padding:40px;color:var(--silver);font-size:0.85rem;">載入中⋯</div>
  </div>
  <div class="config-section">
    <div class="home-section-label" style="padding-left:0;margin-bottom:4px;">系統</div>
    <div class="config-card">
      <div class="config-row" onclick="goSettings()">
        <div class="config-icon">⚙️</div>
        <div class="config-label">系統設定（Token、公司資訊）</div>
        <div class="config-arrow">›</div>
      </div>
      <div class="config-row" onclick="manualSync()">
        <div class="config-icon">🔄</div>
        <div class="config-label">從雲端重新同步設定</div>
        <div class="config-arrow">›</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCREEN 2: 車輛列表 ══ -->
<div id="screen-cars" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goHome()">‹</button>
    <div class="topbar-title" id="cars-title">車輛管理</div>
  </div>
  <div class="cars-list" id="cars-list"></div>
  <button class="fab" onclick="goAdd()" title="新增車輛">＋</button>
</div>

<!-- ══ SCREEN 3: 新增/編輯 ══ -->
<div id="screen-edit" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goCars()">‹</button>
    <div class="topbar-title" id="edit-title">新增車輛</div>
  </div>
  <div class="edit-body">

    <!-- 照片區 -->
    <div class="photo-section">
      <div class="photo-label">車輛照片（最多4張）</div>
      <div class="photo-grid">
        <div class="photo-slot main-slot" id="slot-0" onclick="triggerPhoto(0)">
          <div class="add-icon">📷</div>
        </div>
        <div class="photo-slot" id="slot-1" onclick="triggerPhoto(1)"><div class="add-icon">＋</div></div>
        <div class="photo-slot" id="slot-2" onclick="triggerPhoto(2)"><div class="add-icon">＋</div></div>
        <div class="photo-slot" id="slot-3" onclick="triggerPhoto(3)"><div class="add-icon">＋</div></div>
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </div>

    <!-- 車輛資料 -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">品牌</label>
        <input class="form-input" id="f-brand" placeholder="Toyota" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">年份</label>
        <input class="form-input" id="f-year" type="number" placeholder="2021" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">車名</label>
      <input class="form-input" id="f-name" placeholder="Altis GR Sport" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">車型</label>
        <select class="form-select" id="f-type">
          <option>Sedan 轎車</option>
          <option>SUV</option>
          <option>Hatchback</option>
          <option>Coupe</option>
          <option>MPV</option>
          <option>Pickup</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">燃料</label>
        <select class="form-select" id="f-fuel">
          <option>汽油</option>
          <option>柴油</option>
          <option>油電</option>
          <option>電動</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">售價（元）</label>
      <input class="form-input" id="f-price" type="number" placeholder="628000" inputmode="numeric">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">里程</label>
        <input class="form-input" id="f-km" placeholder="3.2萬公里" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">變速箱</label>
        <select class="form-select" id="f-trans">
          <option>自排</option>
          <option>手排</option>
          <option>CVT</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">顏色</label>
        <input class="form-input" id="f-color" placeholder="珍珠白" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">排氣量</label>
        <input class="form-input" id="f-disp" placeholder="1800cc" autocomplete="off">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">標籤</label>
      <select class="form-select" id="f-tag">
        <option value="">無</option>
        <option>熱門</option>
        <option>精選</option>
        <option>新到</option>
        <option>已售出</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">車輛描述</label>
      <textarea class="form-textarea" id="f-desc" placeholder="車況說明、配備特色⋯"></textarea>
    </div>

    <button class="delete-btn" id="delete-btn" onclick="confirmDelete()" style="display:none">🗑 刪除這輛車</button>
  </div>
  <div class="save-bar">
    <button class="save-btn" id="save-btn" onclick="saveCar()">
      <span id="save-label">儲存車輛</span>
    </button>
  </div>
</div>

<!-- ══ SCREEN 4: 設定 ══ -->
<div id="screen-settings" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goHome()">‹</button>
    <div class="topbar-title">系統設定</div>
    <button class="topbar-action" onclick="saveSettings()">儲存</button>
  </div>
  <div class="edit-body">
    <div class="settings-group">
      <div class="settings-group-label">員工列表（每行一個，格式：名稱,試算表CSV網址）</div>
      <div class="settings-card">
        <div class="settings-row">
          <textarea class="form-textarea" id="s-staff" style="min-height:160px;font-size:0.78rem;" placeholder="文豪,https://docs.google.com/spreadsheets/d/.../export?format=csv&gid=0
阿智,https://docs.google.com/..."></textarea>
        </div>
      </div>
    </div>
    <p style="font-size:0.75rem;color:var(--silver);line-height:1.7;padding:0 4px;">
      ＊GitHub 上傳金鑰已安全存放在伺服器端，前端不會接觸到。<br>
      ＊員工列表會自動同步到雲端，不需要在每台裝置重複設定。
    </p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-sheet">
    <div class="modal-title">確認刪除</div>
    <p style="font-size:0.85rem;color:var(--silver);margin-bottom:16px;">刪除後無法復原，確定要刪除這輛車嗎？</p>
    <button class="modal-btn danger" onclick="doDelete()">確認刪除</button>
    <button class="modal-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════════════════
let state = {
  currentStaff: null,    // { name, csvUrl }
  cars: [],              // 從試算表讀取的車輛
  editIndex: -1,         // -1 = 新增, >= 0 = 編輯
  photos: ['','','',''], // 4個照片欄位（檔名或網址）
  uploading: [false,false,false,false],
  activePhotoSlot: 0,
};

// ══════════════════════════════════════════════════════
//  雲端設定同步
//  GAS_URL 寫死在程式碼裡（這是唯一不需要每次輸入的東西）
//  其他設定（Token、員工列表等）都存在 GAS 試算表，自動同步
// ══════════════════════════════════════════════════════
const BOOTSTRAP_GAS_URL = 'https://script.google.com/macros/s/AKfycbwdX6Nh_CfA2Kxclr-hQH88afm9m5SD0L-FoyA3NjaCsUeY0OKkK3UpZXpNm8N5_0Gafg/exec'; // 已寫死，員工打開直接自動同步，無需設定

function cfg() {
  return {
    user:  'wytu4000',
    repo:  'tianxiang',
    staff: localStorage.getItem('staff_list') || '',
  };
}

function gasUrl() {
  return localStorage.getItem('gas_url') || BOOTSTRAP_GAS_URL;
}

// 從雲端載入設定（App 啟動時呼叫）
async function syncSettingsFromCloud() {
  const url = gasUrl();
  if (!url) return false;
  try {
    const settings = await readSettingsViaGAS(url);
    if (settings.staff_list) localStorage.setItem('staff_list', settings.staff_list);
    localStorage.setItem('gas_url', url);
    return true;
  } catch(e) {
    console.warn('雲端設定同步失敗', e);
    return false;
  }
}

// 把目前設定上傳到雲端
async function syncSettingsToCloud() {
  const url = gasUrl();
  if (!url) throw new Error('請先填入 GAS Web App 網址');
  const settings = {
    staff_list: localStorage.getItem('staff_list') || '',
  };
  await writeSettingsViaGAS(url, settings);
}

function readSettingsViaGAS(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'gasReadSettings_' + Date.now();
    const payload = { action: 'readSettings' };
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const fullUrl = url + '?callback=' + cbName + '&payload=' + encoded + '&t=' + Date.now();
    window[cbName] = (json) => {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      if (json.status === 'ok') resolve(json.settings || {});
      else reject(new Error(json.message || '讀取設定失敗'));
    };
    const script = document.createElement('script');
    script.src = fullUrl;
    script.onerror = () => { delete window[cbName]; reject(new Error('無法連接 GAS')); };
    document.head.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) { delete window[cbName]; reject(new Error('連線逾時')); }
    }, 10000);
  });
}

function writeSettingsViaGAS(url, settings) {
  return new Promise((resolve, reject) => {
    const cbName = 'gasWriteSettings_' + Date.now();
    const payload = { action: 'writeSettings', settings };
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const fullUrl = url + '?callback=' + cbName + '&payload=' + encoded;
    window[cbName] = (json) => {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      if (json.status === 'ok') resolve(json);
      else reject(new Error(json.message || '寫入設定失敗'));
    };
    const script = document.createElement('script');
    script.src = fullUrl;
    script.onerror = () => { delete window[cbName]; reject(new Error('無法連接 GAS')); };
    document.head.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) { delete window[cbName]; reject(new Error('連線逾時')); }
    }, 10000);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome()     { showScreen('screen-home'); loadStaffList(); }
function goSettings() { loadSettingsForm(); showScreen('screen-settings'); }
function goCars()     { showScreen('screen-cars'); }

async function manualSync() {
  const url = gasUrl();
  if (!url) {
    const input = prompt('請輸入 GAS Web App 網址（只需輸入一次，之後會自動記住）：');
    if (!input) return;
    localStorage.setItem('gas_url', input.trim());
  }
  showToast('同步中⋯', '');
  const ok = await syncSettingsFromCloud();
  if (ok) {
    showToast('同步成功！', 'success');
    loadStaffList();
  } else {
    showToast('同步失敗，請確認 GAS 網址正確', 'error');
  }
}

function goStaff(staff) {
  state.currentStaff = staff;
  document.getElementById('cars-title').textContent = staff.name + ' 的車輛';
  showScreen('screen-cars');
  loadCars();
}

function goAdd() {
  state.editIndex = -1;
  state.photos = ['','','',''];
  document.getElementById('edit-title').textContent = '新增車輛';
  document.getElementById('delete-btn').style.display = 'none';
  clearEditForm();
  renderPhotoSlots();
  showScreen('screen-edit');
}

function goEdit(idx) {
  state.editIndex = idx;
  const c = state.cars[idx];
  document.getElementById('edit-title').textContent = '編輯車輛';
  document.getElementById('delete-btn').style.display = 'block';
  fillEditForm(c);
  // 解析照片欄位（M~P）
  state.photos = [String(c[12]||''), String(c[13]||''), String(c[14]||''), String(c[15]||'')];
  renderPhotoSlots();
  showScreen('screen-edit');
}

function loadStaffList() {
  const raw = cfg().staff;
  const container = document.getElementById('staff-list');
  if (!raw.trim()) {
    container.innerHTML = `<div style="text-align:center;padding:40px 20px;">
      <div style="font-size:2rem;margin-bottom:12px;">⚙️</div>
      <div style="color:var(--silver);font-size:0.85rem;line-height:1.7;">尚未設定員工資料<br>請點下方「系統設定」填入員工名稱和試算表網址</div>
    </div>`;
    return;
  }
  const staffList = raw.trim().split('\n').map(line => {
    const parts = line.split(',');
    return { name: parts[0].trim(), csvUrl: parts.slice(1).join(',').trim() };
  }).filter(s => s.name);

  container.innerHTML = staffList.map((s,i) => `
    <div class="staff-card" onclick="goStaff(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div class="staff-avatar">${s.name[0]}</div>
      <div class="staff-info">
        <div class="staff-name">${s.name}</div>
        <div class="staff-meta">${s.csvUrl ? '試算表已設定' : '⚠️ 試算表未設定'}</div>
      </div>
      <div class="staff-arrow">›</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════
//  車輛列表：從試算表讀取
// ══════════════════════════════════════════════════════
async function loadCars() {
  const list = document.getElementById('cars-list');
  list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--silver)"><div class="photo-spinner" style="margin:0 auto 12px"></div>載入中⋯</div>`;

  const gasUrl = localStorage.getItem('gas_url');
  if (!gasUrl) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚙️</div><div class="empty-text">請先在系統設定填入 GAS Web App 網址</div></div>`;
    return;
  }

  try {
    const rows = await readCarsViaGAS();
    state.cars = rows.slice(1).filter(r => r[0]); // 跳過標題列
    renderCarsList(state.cars);
  } catch(e) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">無法載入：${e.message}</div></div>`;
  }
}

// 透過 GAS 直接讀取試算表（即時、無快取）
function readCarsViaGAS() {
  const gasUrl = localStorage.getItem('gas_url');
  return new Promise((resolve, reject) => {
    const cbName = 'gasRead_' + Date.now();
    const payload = { action: 'readCars' };
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const url = gasUrl + '?callback=' + cbName + '&payload=' + encoded + '&t=' + Date.now();

    window[cbName] = (json) => {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      if (json.status === 'ok') resolve(json.data || []);
      else reject(new Error(json.message || '讀取失敗'));
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => {
      delete window[cbName];
      reject(new Error('無法連接 GAS'));
    };
    document.head.appendChild(script);

    setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        reject(new Error('連線逾時'));
      }
    }, 10000);
  });
}

function renderCarsList(rows) {
  const list = document.getElementById('cars-list');
  if (!rows.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🚗</div><div class="empty-text">還沒有車輛資料<br>點右下角「＋」新增第一輛車</div></div>`;
    return;
  }
  const { user, repo } = cfg();
  list.innerHTML = rows.map((r,i) => {
    const imgSrc = r[12] ? resolveImg(String(r[12]), user, repo) : '';
    const price = parseInt(String(r[4]||'0').replace(/[^0-9]/g,'')) || 0;
    const tag = r[10] ? `<span class="car-item-tag">${r[10]}</span>` : '';
    return `
      <div class="car-item" onclick="goEdit(${i})">
        <div class="car-thumb">
          ${imgSrc ? `<img src="${imgSrc}" loading="lazy" onerror="this.parentNode.innerHTML='🚗'">` : '🚗'}
        </div>
        <div class="car-item-info">
          <div class="car-item-brand">${r[0]||''} · ${r[2]||''}</div>
          <div class="car-item-name">${r[1]||''}${tag}</div>
          <div class="car-item-price">$${price.toLocaleString()} 元</div>
        </div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  照片處理
// ══════════════════════════════════════════════════════
function triggerPhoto(slot) {
  if (state.uploading[slot]) return;
  state.activePhotoSlot = slot;
  const input = document.getElementById('photo-input');
  input.value = '';
  input.click();
}

async function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const slot = state.activePhotoSlot;

  // 預覽
  const reader = new FileReader();
  reader.onload = e => {
    setSlotPreview(slot, e.target.result, true);
  };
  reader.readAsDataURL(file);

  const { user, repo } = cfg();

  state.uploading[slot] = true;
  try {
    const ext = file.name.split('.').pop().toLowerCase();
    const ts = Date.now();
    const filename = `car_${ts}_${slot}.${ext}`;
    const b64 = await fileToBase64(file);
    await uploadPhotoViaGAS(filename, b64);
    state.photos[slot] = filename;
    setSlotPreview(slot, resolveImg(filename, user, repo), false);
    showToast('照片上傳成功！', 'success');
  } catch(e) {
    setSlotPreview(slot, '', false);
    showToast('上傳失敗：' + e.message, 'error');
  }
  state.uploading[slot] = false;
}

// 透過 GAS 中轉上傳照片到 GitHub（Token 留在伺服器端，前端不會接觸到）
function uploadPhotoViaGAS(filename, base64Data) {
  const url = gasUrl();
  if (!url) throw new Error('系統尚未設定 GAS 網址');
  const payload = { action: 'uploadPhoto', filename, base64: base64Data };

  return new Promise((resolve, reject) => {
    const cbName = 'gasUpload_' + Date.now();
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const fullUrl = url + '?callback=' + cbName + '&payload=' + encoded;

    window[cbName] = (json) => {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      if (json.status === 'ok') resolve(json.filename);
      else reject(new Error(json.message || '上傳失敗'));
    };
    const script = document.createElement('script');
    script.src = fullUrl;
    script.onerror = () => { delete window[cbName]; reject(new Error('無法連接 GAS')); };
    document.head.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) { delete window[cbName]; reject(new Error('上傳逾時，照片可能太大')); }
    }, 20000);
  });
}

function setSlotPreview(slot, src, loading) {
  const el = document.getElementById(`slot-${slot}`);
  if (loading) {
    el.innerHTML = `<img src="${src}" style="opacity:0.4"><div class="photo-uploading"><div class="photo-spinner"></div></div>`;
  } else if (src) {
    el.innerHTML = `<img src="${src}"><button class="del-btn" onclick="removePhoto(event,${slot})">✕</button>`;
  } else {
    el.innerHTML = slot === 0 ? '<div class="add-icon">📷</div>' : '<div class="add-icon">＋</div>';
  }
}

function removePhoto(e, slot) {
  e.stopPropagation();
  state.photos[slot] = '';
  setSlotPreview(slot, '', false);
}

function renderPhotoSlots() {
  const { user, repo } = cfg();
  for (let i = 0; i < 4; i++) {
    const src = state.photos[i] ? resolveImg(state.photos[i], user, repo) : '';
    setSlotPreview(i, src, false);
  }
}

async function saveCar() {
  const btn = document.getElementById('save-btn');
  const label = document.getElementById('save-label');
  btn.disabled = true;
  label.textContent = '儲存中⋯';

  const row = [
    v('f-brand'), v('f-name'), v('f-year'), v('f-type'),
    v('f-price'), v('f-km'), v('f-fuel'), v('f-color'),
    v('f-disp'), v('f-trans'), v('f-tag'), v('f-desc'),
    state.photos[0], state.photos[1], state.photos[2], state.photos[3],
  ];

  try {
    if (state.editIndex >= 0) {
      state.cars[state.editIndex] = row;
    } else {
      state.cars.push(row);
    }
    await writeSheetViaGAS(state.cars);
    showToast('儲存成功！', 'success');
    setTimeout(() => { goCars(); loadCars(); }, 800);
  } catch(e) {
    showToast('儲存失敗：' + e.message, 'error');
  }
  btn.disabled = false;
  label.textContent = '儲存車輛';
}

// ══════════════════════════════════════════════════════
//  寫回試算表（透過 GAS Web App）
// ══════════════════════════════════════════════════════
async function writeSheetViaGAS(cars) {
  const gasUrl = localStorage.getItem('gas_url');
  if (!gasUrl) throw new Error('請在設定中填入 GAS Web App 網址');

  const headers = ['品牌','車名','年份','車型','售價','里程','燃料','顏色','排氣量','變速箱','標籤','描述','照片1','照片2','照片3','照片4'];
  const payload = { action: 'writeCars', data: [headers, ...cars] };

  return new Promise((resolve, reject) => {
    const cbName = 'gasWrite_' + Date.now();
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const url = gasUrl + '?callback=' + cbName + '&payload=' + encoded;

    window[cbName] = (json) => {
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
      if (json.status === 'ok') resolve(json);
      else reject(new Error(json.message || 'GAS 寫入失敗'));
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => {
      delete window[cbName];
      reject(new Error('無法連接 GAS，請確認部署設定'));
    };
    document.head.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        reject(new Error('連線逾時，請確認 GAS 是否正常運作'));
      }
    }, 10000);
  });
}

// ══════════════════════════════════════════════════════
//  工具函式
// ══════════════════════════════════════════════════════
function v(id) { return document.getElementById(id).value.trim(); }

function resolveImg(url, user, repo) {
  if (!url) return '';
  url = url.trim();
  if (url.startsWith('http')) return url;
  return `https://${user}.github.io/${repo}/${url}`;
}

function clearEditForm() {
  ['f-brand','f-name','f-year','f-price','f-km','f-color','f-disp','f-desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-type').selectedIndex = 0;
  document.getElementById('f-fuel').selectedIndex = 0;
  document.getElementById('f-trans').selectedIndex = 0;
  document.getElementById('f-tag').selectedIndex = 0;
}

function fillEditForm(r) {
  const set = (id, val) => { const el = document.getElementById(id); if(el) el.value = val||''; };
  set('f-brand', r[0]); set('f-name', r[1]);   set('f-year', r[2]);
  set('f-km',    r[5]); set('f-color', r[7]);  set('f-disp', r[8]);
  set('f-price', r[4]); set('f-desc', r[11]);
  setSelect('f-type',  r[3]);
  setSelect('f-fuel',  r[6]);
  setSelect('f-trans', r[9]);
  setSelect('f-tag',   r[10]);
}

function setSelect(id, val) {
  const el = document.getElementById(id);
  if (!el || !val) return;
  for (let i = 0; i < el.options.length; i++) {
    if (el.options[i].value === val || el.options[i].text === val) { el.selectedIndex = i; break; }
  }
}

function parseCSV(text) {
  const rows=[]; let row=[],c='',q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch==='"'){q=!q;continue;}
    if(ch===','&&!q){row.push(c.trim());c='';continue;}
    if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(c.trim());rows.push(row);row=[];c='';continue;}
    c+=ch;
  }
  if(c||row.length){row.push(c.trim());rows.push(row);}
  return rows;
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}
